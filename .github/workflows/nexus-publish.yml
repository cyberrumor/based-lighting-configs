name: publish to nexus mods

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish"
        required: true

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      TAG: ${{ inputs.tag || github.event.release.tag_name }}
    steps:
      - name: Download release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release download "$TAG" --repo "${{ github.repository }}" --pattern "*.zip"

      - name: Upload to Nexus Mods
        uses: Nexus-Mods/upload-action@v1
        with:
          api_key: ${{ secrets.NEXUS_API_KEY }}
          file_group_id: 3215038
          filename: "*.zip"
          version: ${{ env.TAG }}
          display_name: "Based Lighting Configs"
          description: "Remember to endorse!"
