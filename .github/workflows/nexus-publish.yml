name: publish to nexus mods

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish"
        required: true

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.event.release.tag_name }}

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y jq libxml2-utils

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - run: pip install pre-commit

      - run: pre-commit run --all-files

  publish:
    needs: pre-commit
    runs-on: ubuntu-latest
    env:
      TAG: ${{ inputs.tag || github.event.release.tag_name }}
    steps:
      - name: Download source archive
        run: curl -L -o "${{ github.event.repository.name }}-$TAG.zip" "https://github.com/${{ github.repository }}/archive/refs/tags/$TAG.zip"

      - name: Upload to Nexus Mods
        uses: Nexus-Mods/upload-action@v1.0.0-beta.3
        with:
          api_key: ${{ secrets.NEXUS_API_KEY }}
          file_group_id: 3215038
          filename: "${{ github.event.repository.name }}-${{ env.TAG }}.zip"
          version: ${{ env.TAG }}
          display_name: "Based Lighting Configs"
          description: "Remember to endorse!"
