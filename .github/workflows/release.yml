name: build release archive

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build"
        required: true

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.event.release.tag_name }}

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y jq libxml2-utils

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - run: pip install pre-commit

      - run: pre-commit run --all-files

  build:
    needs: pre-commit
    runs-on: ubuntu-latest
    env:
      TAG: ${{ inputs.tag || github.event.release.tag_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.event.release.tag_name }}

      - name: Build release archive
        run: 7z a -t7z "${{ github.event.repository.name }}-$TAG.7z" fomod/ configs/ SKSE/ meshes/ textures/ plugins/

      - name: Upload release artifact
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "$TAG" "${{ github.event.repository.name }}-$TAG.7z"
