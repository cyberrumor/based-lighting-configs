repos:
  - repo: local
    hooks:
      - id: no-shadow-flag
        name: no Shadow flag outside shadows directories
        entry: .pre-commit-hooks/no-shadow-flag.sh
        language: script
        types: [json]
        exclude: shadows/
      - id: sync-shadow-configs
        name: sync shadow configs from no_shadows
        entry: .pre-commit-hooks/sync-shadow-configs.sh
        language: script
        types: [json]
        files: no_shadows/
      - id: match-shadow-filenames
        name: match filenames between no_shadows and shadows
        entry: .pre-commit-hooks/match-shadow-filenames.sh
        language: script
        pass_filenames: false
        always_run: true
      - id: format-json
        name: format json with jq
        entry: .pre-commit-hooks/format-json.sh
        language: script
        types: [json]
      - id: format-xml
        name: format xml with xmllint
        entry: .pre-commit-hooks/format-xml.sh
        language: script
        types: [xml]
      - id: validate-fomod
        name: validate fomod against xsd
        entry: .pre-commit-hooks/validate-fomod.sh
        language: script
        types: [xml]
        files: fomod/ModuleConfig\.xml$
      - id: check-fomod-sources
        name: check fomod source paths exist
        entry: .pre-commit-hooks/check-fomod-sources.sh
        language: script
        types: [xml]
        files: fomod/ModuleConfig\.xml$
